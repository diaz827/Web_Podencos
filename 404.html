<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Página no encontrada</title>
  <link rel="stylesheet" href="CSS/CSS.css">
  <link rel="shortcut icon" href="Imagenes/imagen3.png" type="image/x-icon">
  <style>
    :root {
      --bg-color: #FAF4F0;
      --card-bg: #fff;
      --text-color: #333;
      --header-color: #8B3A20;
      --label-color: #A64B29;
      --gradient-rgba: rgba(166, 75, 41, 0.04);
      --shadow-base: 139, 58, 32;
      --shadow-1: rgba(139, 58, 32, 0.05);
      --shadow-2: rgba(139, 58, 32, 0.2);
      --shadow-3: rgba(139, 58, 32, 0.1);
      --shadow-4: rgba(139, 58, 32, 0.08);
      --shadow-5: rgba(139, 58, 32, 0.15);
      --shadow-6: rgba(139, 58, 32, 0.12);
      --shadow-7: rgba(139, 58, 32, 0.18);
      --btn-hover-bg: #8B3A20;
      --btn-hover-text: #F5EBE6;
      --lightbox-bg: rgba(0, 0, 0, 0.85);
      --lightbox-shadow: rgba(0, 0, 0, 0.5);
      --input-border: #fff;
    }

    body:has(#tema-toggle:checked) {
      --bg-color: #1a1a1a;
      --card-bg: #2d2d2d;
      --text-color: #e0e0e0;
      --header-color: #f5ebe6;
      --label-color: #ff8c00;
      --gradient-rgba: rgba(255, 255, 255, 0.05);
      --shadow-base: 0, 0, 0;
      --shadow-1: rgba(0, 0, 0, 0.3);
      --shadow-2: rgba(0, 0, 0, 0.5);
      --shadow-3: rgba(0, 0, 0, 0.4);
      --shadow-4: rgba(0, 0, 0, 0.3);
      --shadow-5: rgba(0, 0, 0, 0.4);
      --shadow-6: rgba(0, 0, 0, 0.4);
      --shadow-7: rgba(0, 0, 0, 0.5);
      --btn-hover-bg: #ff8c00;
      --btn-hover-text: #1a1a1a;
      --lightbox-bg: rgba(0, 0, 0, 0.95);
      --lightbox-shadow: rgba(0, 0, 0, 0.8);
      --input-border: #444;
    }

    .error-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .error-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
      opacity: 0.4;
    }

    .error-content {
      position: relative;
      z-index: 1;
      background: var(--card-bg);
      padding: 3rem;
      border-radius: 2rem;
      box-shadow: 0 1rem 3rem var(--shadow-2);
      max-width: 500px;
      margin: 1rem;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--header-color);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .error-title {
      font-size: 1.5rem;
      color: var(--text-color);
      margin-bottom: 1rem;
    }

    .error-text {
      color: var(--text-color);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .error-btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: var(--header-color);
      color: var(--bg-color);
      text-decoration: none;
      border-radius: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .error-btn:hover {
      background: var(--btn-hover-bg);
      color: var(--btn-hover-text);
      transform: translateY(-3px);
      box-shadow: 0 0.5rem 1.5rem var(--shadow-2);
    }

    .toggle-container {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 10;
    }

    @media (max-width: 37.5rem) {
      .error-content {
        padding: 2rem;
      }
      
      .error-code {
        font-size: 4rem;
      }
      
      .error-title {
        font-size: 1.2rem;
      }
    }
  </style>
</head>

<body>
  <div class="toggle-container">
    <input type="checkbox" id="tema-toggle" class="tema-toggle">
    <label for="tema-toggle" class="btn tema-label"></label>
  </div>

  <div class="error-container">
    <video class="error-video" autoplay muted loop playsinline>
      <source src="Imagenes/Video1.mp4" type="video/mp4">
    </video>

    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">¡Ups! Página no encontrada</h1>
      <p class="error-text">
        Parece que el podenco ha seguido una pista que no existía. 
        La página que buscas quizás se fue de caza o nunca existió.
      </p>
      <a href="index.html" class="error-btn">Volver al inicio</a>
    </div>
  </div>

  <script>
    const temaToggle = document.getElementById('tema-toggle');
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      temaToggle.checked = true;
    }
    temaToggle.addEventListener('change', () => {
      if (temaToggle.checked) {
        localStorage.setItem('theme', 'dark');
      } else {
        localStorage.setItem('theme', 'light');
      }
    });
  </script>
</body>

</html>
